<!doctype html>
<html lang="en" class="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Color Customizer & Themes</title>
    <style>
      :root {
        --bg-color: #f0f2f5;
        --panel-bg: #ffffff;
        --text-color: #333333;
        --border-color: #e2e8f0;
        --header-color: #1a202c;
        --subtext-color: #718096;
        --section-label: #a0aec0;
        --picker-label: #4a5568;
        --theme-row-bg: #fdfdfd;
        --theme-name-bg: #f7fafc;
        --theme-name-color: #4a5568;
        --menu-btn-bg: #ffffff;
        --menu-btn-hover: #f8fafc;
        --drag-handle: #cbd5e1;
        --btn-light-bg: #f1f5f9;
        --btn-light-color: #334155;
        --btn-light-hover: #e2e8f0;
        --btn-dark-bg: #334155;
        --btn-dark-color: #f8fafc;
        --btn-dark-hover: #1e293b;
        --btn-uw-bg: #ffffff;
        --btn-uw-color: #000000;
        --btn-uw-border: #cbd5e1;
        --btn-uw-hover-bg: #f8fafc;
        --btn-uw-hover-color: #2563eb;
        --btn-ub-bg: #000000;
        --btn-ub-color: #ffffff;
        --btn-ub-hover-bg: #1a1a1a;
        --btn-ub-hover-color: #38bdf8;
        --color-swatch-shadow: rgba(0, 0, 0, 0.1);
        --canvas-bg: #ffffff;
        --canvas-shadow: rgba(0, 0, 0, 0.08);
        --sidebar-shadow: rgba(0, 0, 0, 0.05);
        --scrollbar-thumb: #c1c1c1;
        --scrollbar-thumb-hover: #a0a0a0;
        --scrollbar-track: transparent;
      }

      /* Dark mode variables — applied by class or media query */
      :root.dark,
      :root.auto:is([data-system-dark]) {
        --bg-color: #1a1a2e;
        --panel-bg: #16213e;
        --text-color: #e0e0e0;
        --border-color: #2a2a4a;
        --header-color: #e8e8f0;
        --subtext-color: #9090b0;
        --section-label: #7070a0;
        --picker-label: #b0b0d0;
        --theme-row-bg: #1e1e3a;
        --theme-name-bg: #1a1a34;
        --theme-name-color: #b0b0d0;
        --menu-btn-bg: #16213e;
        --menu-btn-hover: #1e2a4a;
        --drag-handle: #3a3a5a;
        --btn-light-bg: #2a2a4a;
        --btn-light-color: #d0d0e0;
        --btn-light-hover: #3a3a5a;
        --btn-dark-bg: #0f0f2a;
        --btn-dark-color: #e0e0f0;
        --btn-dark-hover: #0a0a20;
        --btn-uw-bg: #2a2a4a;
        --btn-uw-color: #e0e0f0;
        --btn-uw-border: #3a3a5a;
        --btn-uw-hover-bg: #3a3a5a;
        --btn-uw-hover-color: #60a0ff;
        --btn-ub-bg: #0a0a1a;
        --btn-ub-color: #e0e0f0;
        --btn-ub-hover-bg: #151530;
        --btn-ub-hover-color: #38bdf8;
        --color-swatch-shadow: rgba(255, 255, 255, 0.1);
        --canvas-bg: #1e1e3a;
        --canvas-shadow: rgba(0, 0, 0, 0.3);
        --sidebar-shadow: rgba(0, 0, 0, 0.2);
        --scrollbar-thumb: #3a3a5a;
        --scrollbar-thumb-hover: #50507a;
        --scrollbar-track: transparent;
      }

      @media (prefers-color-scheme: dark) {
        :root.auto {
          --bg-color: #1a1a2e;
          --panel-bg: #16213e;
          --text-color: #e0e0e0;
          --border-color: #2a2a4a;
          --header-color: #e8e8f0;
          --subtext-color: #9090b0;
          --section-label: #7070a0;
          --picker-label: #b0b0d0;
          --theme-row-bg: #1e1e3a;
          --theme-name-bg: #1a1a34;
          --theme-name-color: #b0b0d0;
          --menu-btn-bg: #16213e;
          --menu-btn-hover: #1e2a4a;
          --drag-handle: #3a3a5a;
          --btn-light-bg: #2a2a4a;
          --btn-light-color: #d0d0e0;
          --btn-light-hover: #3a3a5a;
          --btn-dark-bg: #0f0f2a;
          --btn-dark-color: #e0e0f0;
          --btn-dark-hover: #0a0a20;
          --btn-uw-bg: #2a2a4a;
          --btn-uw-color: #e0e0f0;
          --btn-uw-border: #3a3a5a;
          --btn-uw-hover-bg: #3a3a5a;
          --btn-uw-hover-color: #60a0ff;
          --btn-ub-bg: #0a0a1a;
          --btn-ub-color: #e0e0f0;
          --btn-ub-hover-bg: #151530;
          --btn-ub-hover-color: #38bdf8;
          --color-swatch-shadow: rgba(255, 255, 255, 0.1);
          --canvas-bg: #1e1e3a;
          --canvas-shadow: rgba(0, 0, 0, 0.3);
          --sidebar-shadow: rgba(0, 0, 0, 0.2);
          --scrollbar-thumb: #3a3a5a;
          --scrollbar-thumb-hover: #50507a;
          --scrollbar-track: transparent;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica,
          Arial, sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* Scrollbar styling */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--scrollbar-track);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
      }

      /* Drag handle hidden on desktop */
      .drag-handle {
        display: none;
      }

      /* Color Mode Toggle */
      .color-mode-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 30;
        background: var(--menu-btn-bg);
        border: 1px solid var(--border-color);
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        font-weight: 600;
        font-size: 0.8rem;
        color: var(--text-color);
        display: flex;
        align-items: center;
        gap: 6px;
        transition: background-color 0.2s;
        user-select: none;
      }
      .color-mode-btn:hover {
        background: var(--menu-btn-hover);
      }
      .color-mode-btn .icon {
        font-size: 1rem;
        line-height: 1;
      }

      /* Mobile Menu Button */
      .menu-btn {
        display: none;
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 30;
        background: var(--menu-btn-bg);
        border: 1px solid var(--border-color);
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        font-weight: 600;
        font-size: 0.9rem;
        align-items: center;
        gap: 8px;
        color: var(--text-color);
        transition: background-color 0.2s;
      }
      .menu-btn:hover {
        background: var(--menu-btn-hover);
      }

      /* Sidebar Controls */
      .sidebar {
        width: 420px;
        background-color: var(--panel-bg);
        border-right: 1px solid var(--border-color);
        padding: 24px;
        overflow-y: auto;
        box-shadow: 2px 0 10px var(--sidebar-shadow);
        display: flex;
        flex-direction: column;
        gap: 24px;
        z-index: 20;
      }

      .header h1 {
        font-size: 1.25rem;
        margin-bottom: 8px;
        color: var(--header-color);
      }

      .header p {
        font-size: 0.85rem;
        color: var(--subtext-color);
        line-height: 1.4;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .control-group h2 {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--section-label);
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 4px;
        margin-bottom: 4px;
      }

      /* Theme Palette UI */
      .theme-container {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .theme-row {
        display: flex;
        align-items: stretch;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        overflow: hidden;
        background: var(--theme-row-bg);
      }

      .theme-name {
        flex: 0 0 110px;
        display: flex;
        align-items: center;
        padding: 6px 8px;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--theme-name-color);
        border-right: 1px solid var(--border-color);
        background: var(--theme-name-bg);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .t-btn {
        flex: 1 1 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px 2px;
        border: none;
        border-right: 1px solid var(--border-color);
        cursor: pointer;
        font-size: 0.7rem;
        font-weight: 600;
        transition: all 0.2s;
      }

      .t-btn:last-child {
        border-right: none;
      }

      .t-btn.light {
        background: var(--btn-light-bg);
        color: var(--btn-light-color);
      }
      .t-btn.light:hover {
        background: var(--btn-light-hover);
      }

      .t-btn.dark {
        background: var(--btn-dark-bg);
        color: var(--btn-dark-color);
      }
      .t-btn.dark:hover {
        background: var(--btn-dark-hover);
      }

      .t-btn.u-w {
        background: var(--btn-uw-bg);
        color: var(--btn-uw-color);
        border-left: 2px solid var(--btn-uw-border);
      }
      .t-btn.u-w:hover {
        background: var(--btn-uw-hover-bg);
        color: var(--btn-uw-hover-color);
      }

      .t-btn.u-b {
        background: var(--btn-ub-bg);
        color: var(--btn-ub-color);
      }
      .t-btn.u-b:hover {
        background: var(--btn-ub-hover-bg);
        color: var(--btn-ub-hover-color);
      }

      /* Manual Pickers */
      .color-picker {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.9rem;
        cursor: pointer;
      }

      .color-picker label {
        cursor: pointer;
        flex-grow: 1;
      }

      input[type='color'] {
        -webkit-appearance: none;
        appearance: none;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        cursor: pointer;
        padding: 0;
        background: none;
        box-shadow: 0 0 0 1px var(--color-swatch-shadow);
      }

      input[type='color']::-webkit-color-swatch-wrapper {
        padding: 0;
      }
      input[type='color']::-webkit-color-swatch {
        border: none;
        border-radius: 4px;
      }

      /* Checkbox UI */
      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        color: var(--picker-label);
        cursor: pointer;
        padding-left: 2px;
      }

      .checkbox-row input[type='checkbox'] {
        cursor: pointer;
        width: 16px;
        height: 16px;
      }

      .checkbox-row label {
        cursor: pointer;
        user-select: none;
      }

      .btn-download {
        background-color: #4299e1;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-top: 10px;
      }

      .btn-download:hover {
        background-color: #3182ce;
      }

      /* SVG Preview Area */
      .preview-area {
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        position: relative;
      }

      /* Fixed Canvas Container */
      #canvas-bg {
        background-color: var(--canvas-bg);
        border-radius: 12px;
        box-shadow: 0 10px 30px var(--canvas-shadow);
        width: fit-content;
        height: auto;
        max-width: 600px;
        max-height: 100%;
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: background-color 0.3s ease;
      }

      svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Mobile Responsive Drawer Logic */
      @media (max-width: 900px) {
        body {
          flex-direction: column;
        }
        .menu-btn {
          display: flex;
        }
        .sidebar {
          position: fixed;
          left: 0;
          right: 0;
          bottom: 0;
          width: 100%;
          max-width: 100%;
          height: 60vh;
          border-right: none;
          border-top: 1px solid var(--border-color);
          border-radius: 20px 20px 0 0;
          padding-top: 24px;
          transform: translateY(100%);
          transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Visual Drag Handle Line — drawn by .drag-handle */
        .sidebar::before {
          display: none;
        }

        .drag-handle {
          display: flex;
          align-items: center;
          justify-content: center;
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 28px;
          cursor: grab;
          touch-action: none;
          z-index: 5;
        }
        .drag-handle:active {
          cursor: grabbing;
        }
        .drag-handle::after {
          content: '';
          width: 40px;
          height: 5px;
          background-color: var(--drag-handle);
          border-radius: 5px;
        }

        .sidebar.open {
          transform: translateY(0);
        }

        .preview-area {
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0; /* Full height initially */
          padding: 20px;
          padding-top: 80px; /* Clear the menu button */
          transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .preview-area.drawer-open {
          bottom: 60vh; /* Shrinks the preview container, auto-scaling the SVG to fit! */
        }
      }
    </style>
    <script>
      // Apply saved color mode before paint to prevent flash
      (function () {
        var mode = localStorage.getItem('colorMode') || 'auto';
        document.documentElement.className = mode;
      })();
    </script>
  </head>
  <body>
    <!-- Mobile menu button -->
    <button class="menu-btn" id="menu-btn">
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
      Customize
    </button>

    <!-- Color Mode Toggle -->
    <button
      class="color-mode-btn"
      id="color-mode-btn"
      title="Toggle color mode"
    >
      <span class="icon" id="color-mode-icon"></span>
      <span id="color-mode-label"></span>
    </button>

    <!-- Sidebar Controls -->
    <div class="sidebar" id="sidebar">
      <div class="drag-handle" id="drag-handle"></div>
      <div class="header">
        <h1>SVG Customizer</h1>
        <p>
          <strong>U-White & U-Black</strong> apply identical perfectly-balanced
          palettes.
        </p>
      </div>

      <div class="control-group">
        <h2>Theme Palettes</h2>
        <div class="theme-container" id="theme-container">
          <!-- Buttons injected by JS -->
        </div>
      </div>

      <div class="control-group">
        <h2>Environment</h2>
        <div class="color-picker">
          <label for="c-bg">Canvas Background</label>
          <input type="color" id="c-bg" value="#ffffff" />
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="include-bg" checked />
          <label for="include-bg">Include background in final SVG</label>
        </div>

        <div class="color-picker">
          <label for="c-grid">Grid Lines</label>
          <input
            type="color"
            id="c-grid"
            value="#add8e6"
            data-target=".theme-grid"
            data-attr="stroke"
          />
        </div>
        <div class="color-picker">
          <label for="c-outline">Main Outlines</label>
          <input
            type="color"
            id="c-outline"
            value="#0f0f0f"
            data-target=".theme-outline"
            data-attr="stroke"
          />
        </div>
      </div>

      <div class="control-group">
        <h2>Cubes & Nodes</h2>
        <div class="color-picker">
          <label for="c-red-front">Top Cube Front</label>
          <input
            type="color"
            id="c-red-front"
            value="#ee7678"
            data-target=".theme-red-front"
            data-attr="fill"
          />
        </div>
        <div class="color-picker">
          <label for="c-red-shadow">Top Cube Shadow</label>
          <input
            type="color"
            id="c-red-shadow"
            value="#d05a5d"
            data-target=".theme-red-shadow"
            data-attr="fill"
          />
        </div>
        <div class="color-picker">
          <label for="c-yellow-front">Bottom Cube Front</label>
          <input
            type="color"
            id="c-yellow-front"
            value="#f2db68"
            data-target=".theme-yellow-front"
            data-attr="fill"
          />
        </div>
        <div class="color-picker">
          <label for="c-yellow-shadow">Bottom Cube Shadow</label>
          <input
            type="color"
            id="c-yellow-shadow"
            value="#d1b747"
            data-target=".theme-yellow-shadow"
            data-attr="fill"
          />
        </div>
      </div>

      <div class="control-group">
        <h2>Connections</h2>
        <div class="color-picker">
          <label for="c-cable-front">Wire Front</label>
          <input
            type="color"
            id="c-cable-front"
            value="#add8e6"
            data-target=".theme-cable-front"
            data-attr="stroke"
          />
        </div>
        <div class="color-picker">
          <label for="c-cable-shadow">Wire Shadow</label>
          <input
            type="color"
            id="c-cable-shadow"
            value="#1e3a8a"
            data-target=".theme-cable-shadow"
            data-attr="stroke"
          />
        </div>
        <div class="color-picker">
          <label for="c-brackets">Corner Brackets</label>
          <input
            type="color"
            id="c-brackets"
            value="#add8e6"
            data-target=".theme-brackets"
            data-attr="stroke"
          />
        </div>
      </div>

      <div class="control-group">
        <h2>Sparkles</h2>
        <div class="color-picker">
          <label for="c-sparkle-w">Sparkle 1</label>
          <input
            type="color"
            id="c-sparkle-w"
            value="#ffffff"
            data-target=".theme-sparkle-w"
            data-attr="both"
          />
        </div>
        <div class="color-picker">
          <label for="c-sparkle-y">Sparkle 2</label>
          <input
            type="color"
            id="c-sparkle-y"
            value="#f6e16a"
            data-target=".theme-sparkle-y"
            data-attr="both"
          />
        </div>
      </div>

      <button class="btn-download" onclick="downloadSVG()">
        Download Custom SVG
      </button>
    </div>

    <!-- Preview Area -->
    <div class="preview-area" id="preview-area">
      <div id="canvas-bg">
        <svg
          id="live-svg"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="-15 -15 330 330"
        >
          <!-- SVG Embedded Background -->
          <rect
            id="svg-export-bg"
            x="-15"
            y="-15"
            width="330"
            height="330"
            fill="#ffffff"
          />

          <!-- Grid -->
          <g class="theme-grid" stroke="#add8e6" stroke-width="1.5">
            <line x1="110" y1="30" x2="110" y2="270" />
            <line x1="190" y1="30" x2="190" y2="270" />
            <line x1="30" y1="110" x2="270" y2="110" />
            <line x1="30" y1="190" x2="270" y2="190" />
          </g>

          <!-- Outer Frame -->
          <rect
            class="theme-outline"
            x="30"
            y="30"
            width="240"
            height="240"
            fill="none"
            stroke="#0f0f0f"
            stroke-width="6"
            stroke-linejoin="miter"
          />

          <!-- Corner Brackets -->
          <g
            class="theme-brackets"
            stroke="#add8e6"
            stroke-width="6"
            fill="none"
            stroke-linecap="square"
            stroke-linejoin="miter"
          >
            <path d="M 287 155 L 295 155 L 295 163" />
            <path d="M 178 280 L 170 280 L 170 272" />
          </g>

          <!-- Connection Cable / Edge Shadow -->
          <path
            class="theme-cable-shadow"
            d="M 130 80 C 170 80, 140 225, 180 225"
            stroke="#1e3a8a"
            stroke-width="8"
            fill="none"
            stroke-linecap="round"
          />

          <!-- Top Box -->
          <g
            class="theme-outline"
            stroke="#0f0f0f"
            stroke-width="6"
            stroke-linejoin="round"
          >
            <polygon
              class="theme-red-shadow"
              points="30,30 45,15 45,115 30,130"
              fill="#d05a5d"
            />
            <polygon
              class="theme-red-shadow"
              points="30,130 45,115 145,115 130,130"
              fill="#d05a5d"
            />
            <rect
              class="theme-red-front"
              x="45"
              y="15"
              width="100"
              height="100"
              fill="#ee7678"
            />
          </g>

          <!-- Bottom Box -->
          <g
            class="theme-outline"
            stroke="#0f0f0f"
            stroke-width="6"
            stroke-linejoin="round"
          >
            <polygon
              class="theme-yellow-shadow"
              points="180,180 195,165 195,255 180,270"
              fill="#d1b747"
            />
            <polygon
              class="theme-yellow-shadow"

          dark: {

          univ: {
            grid: '#bea898',
            outline: '#987868',
            redFront: '#c06038',
            redShadow: '#904028',
            yellowFront: '#d49850',
            yellowShadow: '#a87838',

            sparkleW: '#5888a0',
            sparkleY: '#c06038',
          },
        },
        // --- Cool complementary: ice blue + warm coral accent ---
        'Arctic Aurora': {
          light: {
            bg: '#f0f8fc',
            grid: '#c0dce8',
            outline: '#102838',
            redFront: '#40c8b0',
            redShadow: '#209880',
            yellowFront: '#a0e8d8',
            yellowShadow: '#70c0b0',
            cableFront: '#e87088',
            cableShadow: '#b04860',
            brackets: '#e87088',
            sparkleW: '#40c8b0',
            sparkleY: '#e87088',
          },
          dark: {
            bg: '#06141c',
            grid: '#0e2430',
            outline: '#a0d8e8',
            redFront: '#30e8c8',
            redShadow: '#18a890',
            yellowFront: '#80f0d8',
            yellowShadow: '#50c0a8',
            cableFront: '#f06888',
            cableShadow: '#a03858',
            brackets: '#f06888',
            sparkleW: '#d0f8f0',

          },
          univ: {
            grid: '#88b0c0',

            redFront: '#30b8a0',

            cableFront: '#d85878',
            cableShadow: '#a03858',
            brackets: '#5888a0',
            sparkleW: '#30b8a0',
            sparkleY: '#d85878',
          },
        },
      };

      // Initialize UI
      function buildThemeUI() {
        const container = document.getElementById('theme-container');
        for (const [themeName, variants] of Object.entries(palettes)) {
          const row = document.createElement('div');
          row.className = 'theme-row';

          const label = document.createElement('div');
          label.className = 'theme-name';
          label.innerText = themeName;
          row.appendChild(label);

          // Light Button
          const btnL = document.createElement('button');
          btnL.className = 't-btn light';
          btnL.innerText = 'Light';
          btnL.title = `Apply ${themeName} (Light background optimized)`;
          btnL.onclick = () => {
            applyPalette(
              variants.light,
            ); /* if(window.innerWidth<=900) toggleMenu(); */
          };
          row.appendChild(btnL);

          // Dark Button
          const btnD = document.createElement('button');
          btnD.className = 't-btn dark';
          btnD.innerText = 'Dark';
          btnD.title = `Apply ${themeName} (Dark background optimized)`;
          btnD.onclick = () => {
            applyPalette(variants.dark);
          };
          row.appendChild(btnD);

          // Univ-White Button
          const btnUW = document.createElement('button');
          btnUW.className = 't-btn u-w';
          btnUW.innerText = 'U-White';
          btnUW.title = `Apply ${themeName} Universal Palette on Pure White`;
          btnUW.onclick = () => {
            applyPalette(variants.univ, '#ffffff');
          };
          row.appendChild(btnUW);

          // Univ-Black Button
          const btnUB = document.createElement('button');
          btnUB.className = 't-btn u-b';
          btnUB.innerText = 'U-Black';
          btnUB.title = `Apply ${themeName} Universal Palette on Pure Black`;
          btnUB.onclick = () => {
            applyPalette(variants.univ, '#000000');
          };
          row.appendChild(btnUB);

          container.appendChild(row);
        }
      }

      // Apply selected palette
      function applyPalette(p, forcedBg = null) {
        const mappings = {
          'c-bg': forcedBg || p.bg,
          'c-grid': p.grid,
          'c-outline': p.outline,
          'c-red-front': p.redFront,
          'c-red-shadow': p.redShadow,
          'c-yellow-front': p.yellowFront,
          'c-yellow-shadow': p.yellowShadow,
          'c-cable-front': p.cableFront,
          'c-cable-shadow': p.cableShadow,
          'c-brackets': p.brackets,
          'c-sparkle-w': p.sparkleW,
          'c-sparkle-y': p.sparkleY,
        };

        for (let id in mappings) {
          let el = document.getElementById(id);
          if (el) {
            el.value = mappings[id];
            el.dispatchEvent(new Event('input')); // Trigger update
          }
        }
      }

      // Background Update Logic
      const bgInput = document.getElementById('c-bg');
      const includeBgCheckbox = document.getElementById('include-bg');
      const svgExportBg = document.getElementById('svg-export-bg');

      function updateBackground() {
        const color = bgInput.value;

        if (includeBgCheckbox.checked) {
          svgExportBg.setAttribute('fill', color);
        } else {
          svgExportBg.setAttribute('fill', 'none');
        }
      }

      bgInput.addEventListener('input', updateBackground);
      includeBgCheckbox.addEventListener('change', updateBackground);

      // Standard color picker logic for elements
      document.querySelectorAll('input[data-target]').forEach((input) => {
        input.addEventListener('input', (e) => {
          const color = e.target.value;
          const targetSelector = e.target.getAttribute('data-target');
          const attrType = e.target.getAttribute('data-attr');

          document.querySelectorAll(targetSelector).forEach((element) => {
            if (attrType === 'both') {
              if (
                element.hasAttribute('fill') &&
                element.getAttribute('fill') !== 'none'
              ) {
                element.setAttribute('fill', color);
              }
              if (
                element.hasAttribute('stroke') &&
                element.getAttribute('stroke') !== 'none'
              ) {
                element.setAttribute('stroke', color);
              }
            } else {
              element.setAttribute(attrType, color);
            }
          });
        });
      });

      // Download feature
      function downloadSVG() {
        const svg = document.getElementById('live-svg');
        const serializer = new XMLSerializer();
        let source = serializer.serializeToString(svg);
        source = '<?xml version="1.0" standalone="no"?>\r\n' + source;
        const url =
          'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(source);

        const link = document.createElement('a');
        link.href = url;
        link.download = 'custom-graphic.svg';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      // Color Mode Toggle (light / dark / auto)
      const colorModeBtn = document.getElementById('color-mode-btn');
      const colorModeIcon = document.getElementById('color-mode-icon');
      const colorModeLabel = document.getElementById('color-mode-label');
      const modes = ['auto', 'light', 'dark'];
      const modeIcons = { auto: '\u25D0', light: '\u2600', dark: '\u263E' };
      const modeLabels = { auto: 'Auto', light: 'Light', dark: 'Dark' };
      let currentMode = localStorage.getItem('colorMode') || 'auto';

      function applyColorMode(mode) {
        currentMode = mode;
        localStorage.setItem('colorMode', mode);
        const root = document.documentElement;
        root.classList.remove('auto', 'light', 'dark');
        root.classList.add(mode);
        colorModeIcon.textContent = modeIcons[mode];
        colorModeLabel.textContent = modeLabels[mode];
      }

      colorModeBtn.addEventListener('click', () => {
        const next = modes[(modes.indexOf(currentMode) + 1) % modes.length];
        applyColorMode(next);
      });

      applyColorMode(currentMode);

      // Mobile Drawer Drag Handle
      const dragHandle = document.getElementById('drag-handle');
      let dragStartY = 0;
      let dragging = false;
      let sidebarStartTranslate = 0;

      function getDrawerTranslateY() {
        const transform = getComputedStyle(sidebar).transform;
        if (transform === 'none') return 0;
        const matrix = new DOMMatrix(transform);
        return matrix.m42;
      }

      function onDragStart(e) {
        if (window.innerWidth > 900) return;
        dragging = true;
        dragStartY = e.touches ? e.touches[0].clientY : e.clientY;
        sidebarStartTranslate = getDrawerTranslateY();
        sidebar.style.transition = 'none';
        previewArea.style.transition = 'none';
      }

      function onDragMove(e) {
        if (!dragging) return;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let delta = clientY - dragStartY;
        // Only allow dragging down (closing) when open, or up (opening) when closed
        const isOpen = sidebar.classList.contains('open');
        if (isOpen) {
          delta = Math.max(0, delta); // Only drag down to close
        } else {
          delta = Math.min(0, delta); // Only drag up to open
        }
        const translate = sidebarStartTranslate + delta;
        const clamped = Math.max(0, Math.min(translate, sidebar.offsetHeight));
        sidebar.style.transform = `translateY(${clamped}px)`;
      }

      function onDragEnd(e) {
        if (!dragging) return;
        dragging = false;
        sidebar.style.transition = '';
        previewArea.style.transition = '';
        sidebar.style.transform = '';

        const clientY = e.changedTouches
          ? e.changedTouches[0].clientY
          : e.clientY;
        const delta = clientY - dragStartY;
        const threshold = sidebar.offsetHeight * 0.25;
        const isOpen = sidebar.classList.contains('open');

        if (isOpen && delta > threshold) {
          // Swipe down far enough — close
          toggleMenu();
        } else if (!isOpen && delta < -threshold) {
          // Swipe up far enough — open
          toggleMenu();
        }
      }

      dragHandle.addEventListener('touchstart', onDragStart, {
        passive: true,
      });
      document.addEventListener('touchmove', onDragMove, { passive: false });
      document.addEventListener('touchend', onDragEnd);

      dragHandle.addEventListener('mousedown', onDragStart);
      document.addEventListener('mousemove', onDragMove);
      document.addEventListener('mouseup', onDragEnd);

      // Run setup
      buildThemeUI();
      updateBackground();
    </script>
  </body>
