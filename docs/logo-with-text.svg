  <!-- Title Text -->
  <text x="150" y="62.5" fill="#f0eed2" font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="32" font-weight="500" letter-spacing="1" dominant-baseline="middle">react-blender-nodes</text>
