<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 125">
  <!-- Background -->
  <rect x="0" y="0" width="550" height="125" fill="#0e1939"/>

  <!-- Scaled Icon -->
  <g transform="translate(15, 2) scale(0.37)">
    <!-- Grid -->
    <g stroke="#a1ccf7" stroke-width="1.5">
      <line x1="110" y1="30" x2="110" y2="270"/>
      <line x1="190" y1="30" x2="190" y2="270"/>
      <line x1="30" y1="110" x2="270" y2="110"/>
      <line x1="30" y1="190" x2="270" y2="190"/>
