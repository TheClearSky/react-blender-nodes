    <!-- Connection Cable / Edge Shadow -->
    <path d="M 130 80 C 170 80, 140 225, 180 225" stroke="#3d579e" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Top Box -->
    <g stroke="#3170a0" stroke-width="6" stroke-linejoin="round">
