      <polygon points="180,270 195,255 285,255 270,270" fill="#d1b747"/>
      <rect x="195" y="165" width="90" height="90" fill="#f2db68"/>
    </g>

    <!-- Connection Cable Front -->
    <path d="M 145 65 C 185 65, 155 210, 195 210" stroke="#a1ccf7" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Nodes -->
    <circle cx="145" cy="65" r="9" fill="#ee7678" stroke="#3170a0" stroke-width="6"/>
    <circle cx="195" cy="210" r="9" fill="#f2db68" stroke="#3170a0" stroke-width="6"/>

